services:
  zk1:
    image: zookeeper:3.9
    hostname: zk1
    container_name: zk1
    ports:
      - "2191:2181"   # host 2191 to avoid clashing with other local ZK/Kafka setups on 2181
      - "7001:7000"   # AdminServer (four-letter-word API also works on 2181)
    environment:
      ZOO_MY_ID: 1
      ZOO_SERVERS: server.1=0.0.0.0:2888:3888;2181 server.2=zk2:2888:3888;2181 server.3=zk3:2888:3888;2181
      ZOO_4LW_COMMANDS_WHITELIST: "ruok,mntr,stat,srvr,conf"
    networks:
      - zk-net

  zk2:
    image: zookeeper:3.9
    hostname: zk2
    container_name: zk2
    ports:
      - "2182:2181"
      - "7002:7000"
    environment:
      ZOO_MY_ID: 2
      ZOO_SERVERS: server.1=zk1:2888:3888;2181 server.2=0.0.0.0:2888:3888;2181 server.3=zk3:2888:3888;2181
      ZOO_4LW_COMMANDS_WHITELIST: "ruok,mntr,stat,srvr,conf"
    networks:
      - zk-net

  zk3:
    image: zookeeper:3.9
    hostname: zk3
    container_name: zk3
    ports:
      - "2183:2181"
      - "7003:7000"
    environment:
      ZOO_MY_ID: 3
      ZOO_SERVERS: server.1=zk1:2888:3888;2181 server.2=zk2:2888:3888;2181 server.3=0.0.0.0:2888:3888;2181
      ZOO_4LW_COMMANDS_WHITELIST: "ruok,mntr,stat,srvr,conf"
    networks:
      - zk-net

networks:
  zk-net:
    driver: bridge
