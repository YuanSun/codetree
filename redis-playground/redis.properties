# ─────────────────────────────────────────────────────────────
# Redis connection config — edit this file only
# ─────────────────────────────────────────────────────────────

# Your local Redis (brew install redis / redis-server)
redis.host=localhost
redis.port=6379

# Leave blank if no password (default for local installs)
redis.password=

# DB index 1 keeps playground data isolated from DB 0 (default)
# Wipe with:  redis-cli -n 1 FLUSHDB
redis.db=1

# Connection pool
redis.pool.maxTotal=20
redis.pool.maxIdle=10
redis.pool.minIdle=2
redis.pool.connectTimeoutMs=2000
