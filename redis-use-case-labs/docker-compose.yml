services:
  redis:
    image: redis:7-alpine
    container_name: redis-use-case-labs
    ports:
      - "6379:6379"
    command: ["redis-server", "--notify-keyspace-events", "Ex"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 15

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: redis-use-case-labs-ui
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
