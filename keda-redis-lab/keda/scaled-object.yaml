# keda/scaled-object.yaml
#
# This is the heart of the lab — it instructs KEDA to:
#   1. Watch the length of the 'orders-queue' Redis list
#   2. Scale the 'order-consumer' Deployment between 0 and 10 replicas
#   3. Add one replica per 2,000 queued jobs (listLength)
#   4. Use asymmetric cooldowns: fast scale-up, slow scale-down
#
# This mirrors a production pattern where you want quick reaction to burst
# but don't want to thrash pods during temporary queue spikes. It's the
# direct Redis analog of the Kafka consumer-lag scaler in keda-kafka-lab.

apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: order-consumer-scaler
  namespace: lab
  annotations:
    keda.sh/description: "Scale order consumers based on Redis list (queue) length"
spec:
  # ── Target ────────────────────────────────────────────────────────────────
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: order-consumer # must match deployment name exactly

  # ── Replica bounds ────────────────────────────────────────────────────────
  minReplicaCount: 0 # scale-to-zero when the queue is empty
  maxReplicaCount: 10 # cap at 10 workers

  # ── Timing (asymmetric cooldowns) ────────────────────────────────────────
  pollingInterval: 10 # seconds: how often KEDA checks queue length
  cooldownPeriod:
    120 # seconds: how long to wait before scaling DOWN after the
    # queue drains. Scale-UP happens on the very next poll
    # (effectively immediate — no separate scale-up cooldown).

  # ── Trigger ───────────────────────────────────────────────────────────────
  triggers:
    - type: redis
      metadata:
        # Redis connection (no auth in this lab — see redis/values.yaml)
        address: redis-master.redis.svc.cluster.local:6379

        # What to watch
        listName: orders-queue

        # Scaling formula:
        #   desiredReplicas = ceil(listLength / listLength_threshold)
        #
        # With listLength=2000 and a 20,000-job burst:
        #   - 2,000 queued  → 1 replica
        #   - 10,000 queued → 5 replicas
        #   - 20,000+       → 10 replicas (capped by maxReplicaCount)
        listLength: "2000"

        # Don't bother scaling up for a trivially small backlog
        activationListLength: "5"
